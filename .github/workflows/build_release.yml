name: Build and Release Disbot

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    # === ✨ 新增這個步驟：自動注入 Token ===
    - name: Inject Secrets into Code
      env:
        # 讀取你在 GitHub Secrets 設定的 Token
        MY_TOKEN: ${{ secrets.DISBOT_GITHUB_TOKEN }}
      shell: python
      run: |
        import os
        
        # 取得密鑰
        token = os.environ.get("MY_TOKEN")
        if not token:
            print("Error: Secret TOKEN is empty! Make sure DISBOT_GITHUB_TOKEN is set in GitHub Settings.")
            exit(1)
            
        # 要注入的目標字串 (這是我們為了過安檢寫的代碼)
        target_str = 'os.getenv("DISBOT_GITHUB_TOKEN", "")'
        
        # 要修改的檔案
        files = ["Disbot_Ultra.py", "disbot_core.py"]
        
        for fpath in files:
            if os.path.exists(fpath):
                print(f"Processing {fpath}...")
                with open(fpath, "r", encoding="utf-8") as f:
                    content = f.read()
                
                if target_str in content:
                    # 將 os.getenv(...) 替換成真實的 Token 字串
                    new_content = content.replace(target_str, f'"{token}"')
                    with open(fpath, "w", encoding="utf-8") as f:
                        f.write(new_content)
                    print(f"✅ Successfully injected token into {fpath}")
                else:
                    print(f"⚠️ Target string not found in {fpath}")
    # ========================================

    - name: Build Disbot Manager
      run: |
        pyinstaller --noconfirm --onefile --windowed --clean `
          --icon="logo1.ico" `
          --name="Disbot_Manager" `
          --distpath="Release_Output" `
          --hidden-import=customtkinter `
          "Disbot_Manager.py"

    - name: Build Disbot Ultra
      run: |
        pyinstaller --noconfirm --onefile --windowed --clean `
          --icon="logo.ico" `
          --name="Disbot_Ultra" `
          --distpath="Release_Output" `
          --collect-all=customtkinter `
          --hidden-import=requests `
          --hidden-import=PIL `
          --hidden-import=packaging `
          --hidden-import=uuid `
          --hidden-import=webbrowser `
          --hidden-import=subprocess `
          --hidden-import=threading `
          --hidden-import=random `
          --hidden-import=json `
          --hidden-import=datetime `
          --hidden-import=time `
          --hidden-import=os `
          --hidden-import=sys `
          --hidden-import=tkinter `
          --hidden-import=ctypes `
          --hidden-import=tkinter.filedialog `
          --hidden-import=tkinter.messagebox `
          "Disbot_Ultra.py"

    - name: Rename Executables
      run: |
        Move-Item -Path "Release_Output\Disbot_Manager.exe" -Destination "Release_Output\Disbot Manager.exe" -Force
        Move-Item -Path "Release_Output\Disbot_Ultra.exe" -Destination "Release_Output\Disbot Ultra.exe" -Force

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Disbot-Builds
        path: Release_Output/*.exe

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: Release_Output/*.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
